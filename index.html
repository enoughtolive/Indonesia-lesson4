<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기초 인도네시아어 4강</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    .hero {
      background: linear-gradient(180deg, #58cc02, #46b000);
      color: white;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 10px 24px rgba(70, 176, 0, 0.25);
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    .hero p {
      margin: 0;
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.96;
    }

    .section-title {
      font-size: 22px;
      font-weight: 800;
      margin: 24px 0 14px;
    }

    .lesson-grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
    }

    .badge {
      display: inline-block;
      background: #ecfdf3;
      color: #15803d;
      border: 1px solid #bbf7d0;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .indo {
      font-size: 28px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .line {
      font-size: 16px;
      line-height: 1.7;
      margin: 5px 0;
    }

    .label {
      display: inline-block;
      min-width: 110px;
      color: #6b7280;
      font-weight: 700;
    }

    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .play-btn {
      background: #58cc02;
      color: white;
      box-shadow: 0 4px 0 #3d8f00;
    }

    .slow-btn {
      background: #eef2ff;
      color: #3730a3;
      box-shadow: 0 4px 0 #c7d2fe;
    }

    .split-wrap {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed #d1d5db;
    }

    .split-title {
      font-size: 13px;
      font-weight: 800;
      color: #6b7280;
      margin-bottom: 8px;
    }

    .split-item {
      margin-bottom: 10px;
      padding: 10px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
    }

    .split-label {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 6px;
      line-height: 1.6;
    }

    .quiz-wrap {
      margin-top: 28px;
    }

    .quiz-card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 6px 18px rgba(17, 24, 39, 0.06);
    }

    .progress-text {
      font-size: 14px;
      font-weight: 800;
      color: #4b5563;
      margin-bottom: 14px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #58cc02;
      transition: width 0.3s ease;
    }

    .question {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.5;
      margin-bottom: 14px;
    }

    .answers {
      display: grid;
      gap: 10px;
    }

    .answer-btn {
      background: white;
      color: #111827;
      border: 2px solid #d1d5db;
      border-radius: 16px;
      padding: 14px 16px;
      text-align: left;
      box-shadow: none;
      font-weight: 700;
    }

    .answer-btn.correct {
      background: #ecfdf3;
      border-color: #22c55e;
      color: #166534;
    }

    .answer-btn.wrong {
      background: #fef2f2;
      border-color: #ef4444;
      color: #991b1b;
    }

    .result {
      margin-top: 14px;
      font-weight: 800;
      font-size: 16px;
      min-height: 24px;
    }

    .next-btn, .restart-btn {
      margin-top: 14px;
      background: #1f2937;
      color: white;
      box-shadow: 0 4px 0 #111827;
    }

    .tip {
      margin-top: 18px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 14px 16px;
      color: #9a3412;
      line-height: 1.7;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      .hero h1 {
        font-size: 26px;
      }
      .indo {
        font-size: 24px;
      }
      .question {
        font-size: 19px;
      }
      .label {
        min-width: 95px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>기초 인도네시아어 4강</h1>
      <p>기본 음식·감정 단어 + 일상 표현 + 전도 시작과 복음 전달 + 퀴즈</p>
    </div>

    <div class="section-title">1. 단어 (기본 음식 + 감정)</div>
    <div class="lesson-grid" id="wordGrid"></div>

    <div class="section-title">2. 일상 표현</div>
    <div class="lesson-grid" id="dailyGrid"></div>

    <div class="section-title">3. 전도 시작 + 복음 전체</div>
    <div class="lesson-grid" id="gospelGrid"></div>

    <div class="section-title">4. 구문 / 단어 설명</div>

    <div class="section-title">5. 짧은 대화</div>
    <div class="lesson-grid" id="dialogueGrid"></div>

    <div class="quiz-wrap">
      <div class="section-title">6. 퀴즈</div>
      <div class="quiz-card">
        <div class="progress-text" id="progressText">1 / 6</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="question" id="questionBox"></div>
        <div class="answers" id="answersBox"></div>
        <div class="result" id="resultBox"></div>
        <div id="nextArea"></div>
      </div>

      <div class="tip">
        각 인도네시아어 문장은 🔊 버튼을 누르면 들을 수 있습니다. 긴 문장은 “끊어 듣기” 버튼으로 나누어 들을 수 있어요.
      </div>
    </div>
  </div>

  <script>

      { badge: "일상 표현", indo: "Mau makan?", koPron: "마우 마깐?", zhPron: "毛 马坎？", meaning: "먹을래요? / 要吃吗" },
      { badge: "일상 표현", indo: "Mau minum?", koPron: "마우 미눔?", zhPron: "毛 米努姆？", meaning: "마실래요? / 要喝吗" },

    const gospelExpressions = [

      { badge: "전도 표현", indo: "Kami sedang memberitakan Injil.", koPron: "까미 쓰당 멤버리따깐 인질", zhPron: "卡米 瑟当 门伯里塔坎 音吉尔", meaning: "저희는 전도를 하고 있어요 / 我们正在传福音" },
      { badge: "전도 표현", indo: "Apa agama Anda?", koPron: "아빠 아가마 안다", zhPron: "阿帕 阿加玛 安达", meaning: "당신의 종교는 무엇인가요? / 你的宗教是什么？" },
      {
        badge: "전도 표현",
        indo: "Manusia memiliki tubuh dan roh.",
        koPron: "마누시아 머밀리끼 뚜부흐 단 로흐",

      {
        badge: "전도 표현",

        koPron: "로흐 버라살 다리 뚜한 단 하루스 끔발리 끄빠다냐",
        zhPron: "罗赫 贝拉萨尔 达里 图汉 丹 哈鲁斯 克姆巴利 克帕达尼亚",
        meaning: "영은 하나님으로부터 왔기에 반드시 하나님께 돌아가야 해요 / 灵魂来自上帝，必须归回上帝",
        parts: [
          { text: "Roh berasal dari Tuhan", label: "로흐 버라살 다리 뚜한 / 罗赫 贝拉萨尔 达里 图汉" },
          { text: "dan harus kembali", label: "단 하루스 끔발리 / 丹 哈鲁斯 克姆巴利" },
          { text: "kepada-Nya", label: "끄빠다냐 / 克帕达尼亚" }
        ]
      },
      {
        badge: "전도 표현",
        indo: "Melalui Yesus, roh kita bisa kembali kepada Tuhan.",
        koPron: "멀랄루이 예수스 로흐 끼따 비사 끔발리 끄빠다 뚜한",
        zhPron: "梅拉卢伊 耶稣斯 罗赫 基塔 比萨 克姆巴利 克帕达 图汉",
        meaning: "예수를 통해서 우리 영이 하나님께로 돌아갈 수 있어요 / 通过耶稣，我们的灵可以回到上帝那里",
        parts: [
          { text: "Melalui Yesus", label: "멀랄루이 예수스 / 梅拉卢伊 耶稣斯" },
          { text: "roh kita bisa kembali", label: "로흐 끼따 비사 끔발리 / 罗赫 基塔 比萨 克姆巴利" },
          { text: "kepada Tuhan", label: "끄빠다 뚜한 / 克帕达 图汉" }
        ]
      },
      { badge: "전도 표현", indo: "Yesus mengasihi Anda.", koPron: "예수스 멍아시히 안다", zhPron: "耶稣斯 孟阿西希 安达", meaning: "예수님은 당신을 사랑해요 / 耶稣爱你" },
      { badge: "전도 표현", indo: "Saya berharap Anda mengenal Yesus.", koPron: "사야 버르하랍 안다 멍으날 예수스", zhPron: "萨亚 贝尔哈拉普 安达 默额纳尔 耶稣斯", meaning: "당신이 예수를 알기를 소망합니다 / 我希望你认识耶稣" }
    ];

    const explainItems = [
      { badge: "설명", indo: "Kami", koPron: "까미", zhPron: "卡米", meaning: "저희, 우리 / 我们" },
      { badge: "설명", indo: "orang Kristen", koPron: "오랑 크리스텐", zhPron: "欧朗 克里斯滕", meaning: "그리스도인 / 基督徒" },
      { badge: "설명", indo: "kabar baik", koPron: "까바르 바이크", zhPron: "卡巴尔 巴伊克", meaning: "기쁜 소식 / 好消息" },
      { badge: "설명", indo: "memberitakan Injil", koPron: "멤버리따깐 인질", zhPron: "门伯里塔坎 音吉尔", meaning: "복음을 전하다 / 传福音" },
      { badge: "설명", indo: "agama", koPron: "아가마", zhPron: "阿加玛", meaning: "종교 / 宗教" },
      { badge: "설명", indo: "roh", koPron: "로흐", zhPron: "罗赫", meaning: "영 / 灵魂" },

      { badge: "설명", indo: "kembali", koPron: "끔발리", zhPron: "克姆巴利", meaning: "돌아가다 / 回去" },

      { badge: "설명", indo: "memberitakan Injil", koPron: "멤버리따깐 인질", zhPron: "门伯里塔坎 音吉尔", meaning: "복음을 전하다 / 传福音" },
      { badge: "설명", indo: "mengenal", koPron: "멍으날", zhPron: "默额纳尔", meaning: "알다, 알게 되다 / 认识" }

    const dialogues = [
      { badge: "짧은 대화", indo: "(Per)misi.", koPron: "(뻐르)미시", zhPron: "(珀尔)米西", meaning: "실례합니다 / 打扰一下" },
      { badge: "짧은 대화", indo: "Kami orang Kristen.", koPron: "까미 오랑 크리스텐", zhPron: "卡米 欧朗 克里斯滕", meaning: "저희는 그리스도인입니다 / 我们是基督徒" },
      { badge: "짧은 대화", indo: "Kami ingin berbagi kabar baik.", koPron: "까미 잉인 버르바기 까바르 바이크", zhPron: "卡米 英银 伯尔巴吉 卡巴尔 巴伊克", meaning: "저희는 기쁜 소식을 나누고 싶어요 / 我们想分享好消息" },
      { badge: "짧은 대화", indo: "Apa agama Anda?", koPron: "아빠 아가마 안다", zhPron: "阿帕 阿加玛 安达", meaning: "당신의 종교는 무엇인가요? / 你的宗教是什么？" },
      { badge: "짧은 대화", indo: "Yesus mengasihi Anda.", koPron: "예수스 멍아시히 안다", zhPron: "耶稣斯 孟阿西希 安达", meaning: "예수님은 당신을 사랑해요 / 耶稣爱你" }
    ];

    function createCards(data, targetId) {
      const target = document.getElementById(targetId);
      target.innerHTML = data.map(item => {
        let partsHtml = "";

        if (item.parts && item.parts.length > 0) {
          partsHtml = `
            <div class="split-wrap">
              <div class="split-title">끊어 듣기</div>
              ${item.parts.map(part => `
                <div class="split-item">
                  <div class="split-label">${part.label}</div>
                  <button class="slow-btn" onclick="speak('${part.text.replace(/'/g, "\\'")}', 0.75)">🔊 ${part.text}</button>
                </div>
              `).join("")}
            </div>
          `;
        }

        return `
          <div class="card">
            <div class="badge">${item.badge}</div>
            <div class="indo">${item.indo}</div>
            <div class="line"><span class="label">한글 발음</span>${item.koPron}</div>
            <div class="line"><span class="label">中文发音</span>${item.zhPron}</div>
            <div class="line"><span class="label">뜻</span>${item.meaning}</div>
            <div class="btns">
              <button class="play-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.9)">🔊 전체 듣기</button>
              <button class="slow-btn" onclick="speak('${item.indo.replace(/'/g, "\\'")}', 0.65)">🐢 천천히</button>
            </div>
            ${partsHtml}
          </div>
        `;
      }).join("");
    }

    createCards(words, "wordGrid");
    createCards(dailyExpressions, "dailyGrid");
    createCards(gospelExpressions, "gospelGrid");
    createCards(explainItems, "explainGrid");
    createCards(dialogues, "dialogueGrid");

    function getVoice() {
      const voices = speechSynthesis.getVoices();
      return voices.find(v => v.lang && v.lang.toLowerCase().startsWith("id")) ||
             voices.find(v => v.lang && v.lang.toLowerCase().startsWith("ms")) ||
             voices.find(v => v.lang && v.lang.toLowerCase().startsWith("en"));
    }

    function speak(text, rate = 0.9) {
      if (!("speechSynthesis" in window)) {
        alert("이 브라우저는 음성 재생을 지원하지 않습니다.");
        return;
      }
      speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      const voice = getVoice();
      if (voice) utter.voice = voice;
      utter.lang = voice?.lang || "id-ID";
      utter.rate = rate;
      utter.pitch = 1;
      speechSynthesis.speak(utter);
    }

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {};
      window.addEventListener("load", () => {
        speechSynthesis.getVoices();
      });
    }

    const quizData = [
      { question: "Enak 뜻은 무엇일까요?", options: ["맛있는", "매운", "차가운"], answer: "맛있는" },
      { question: "Suka 뜻은 무엇일까요?", options: ["먹다", "좋아하다", "마시다"], answer: "좋아하다" },
      { question: "Permisi 뜻은 무엇일까요?", options: ["안녕하세요", "실례합니다", "감사합니다"], answer: "실례합니다" },
      { question: "Apa agama Anda? 뜻은 무엇일까요?", options: ["당신은 어디서 왔나요?", "당신의 종교는 무엇인가요?", "당신은 누구인가요?"], answer: "당신의 종교는 무엇인가요?" },
      { question: "Yesus mengasihi Anda 뜻은 무엇일까요?", options: ["예수님은 당신을 사랑해요", "하나님은 사랑입니다", "당신은 예수를 믿나요"], answer: "예수님은 당신을 사랑해요" },
      { question: "Kami orang Kristen 뜻은 무엇일까요?", options: ["저희는 그리스도인입니다", "저희는 친구입니다", "저희는 행사에 갑니다"], answer: "저희는 그리스도인입니다" }
    ];

    let current = 0;
    let score = 0;

    const questionBox = document.getElementById("questionBox");
    const answersBox = document.getElementById("answersBox");
    const resultBox = document.getElementById("resultBox");
    const nextArea = document.getElementById("nextArea");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");

    function updateProgress() {
      progressText.textContent = `${Math.min(current + 1, quizData.length)} / ${quizData.length}`;
      progressFill.style.width = `${(current / quizData.length) * 100}%`;
    }

    function renderQuiz() {
      if (current >= quizData.length) {
        progressText.textContent = "완료";
        progressFill.style.width = "100%";
        questionBox.textContent = `퀴즈 끝! 점수는 ${score} / ${quizData.length}`;
        answersBox.innerHTML = "";
        resultBox.textContent = score === quizData.length ? "정말 잘했어요! 🎉" : "좋아요. 다시 하면 더 잘할 수 있어요!";
        nextArea.innerHTML = `<button class="restart-btn" onclick="restartQuiz()">다시 하기</button>`;
        return;
      }

      updateProgress();
      const q = quizData[current];
      questionBox.textContent = q.question;
      resultBox.textContent = "";
      nextArea.innerHTML = "";

      answersBox.innerHTML = q.options.map(opt => `
        <button class="answer-btn" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>
      `).join("");
    }

    function checkAnswer(button, selected) {
      const q = quizData[current];
      const buttons = document.querySelectorAll(".answer-btn");

      buttons.forEach(btn => btn.disabled = true);
      buttons.forEach(btn => {
        if (btn.textContent === q.answer) {
          btn.classList.add("correct");
        }
      });

      if (selected === q.answer) {
        score++;
        resultBox.textContent = "정답입니다!";
        button.classList.add("correct");
      } else {
        resultBox.textContent = `아쉬워요. 정답은 "${q.answer}" 입니다.`;
        button.classList.add("wrong");
      }

      nextArea.innerHTML = `<button class="next-btn" onclick="nextQuestion()">${current === quizData.length - 1 ? "결과 보기" : "다음 문제"}</button>`;
      progressFill.style.width = `${((current + 1) / quizData.length) * 100}%`;
    }

    function nextQuestion() {
      current++;
      renderQuiz();
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      renderQuiz();
    }

    renderQuiz();
  </script>
</body>
</html>
